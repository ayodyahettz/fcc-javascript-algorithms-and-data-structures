<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lightbox Viewer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Lightbox Gallery</h1>
    <div class="gallery">
        <img class="gallery-item" src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg" alt="Stonehenge">
        <img class="gallery-item" src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg" alt="storm-thumbnail">
        <img class="gallery-item" src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg" alt="Trees">

    </div>

    <div class="lightbox">
        <button id="close-btn">&times;</button>
        <img src="" alt="Lightbox image" id="lightbox-image">
    </div>
    <script src="script.js"></script>
</body>
</html>
